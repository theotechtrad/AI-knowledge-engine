# railway.toml — Railway deployment config

[deploy]
dockerfile = "Dockerfile"
startCommand = "python main.py"
healthcheckPath = "/"
healthcheckTimeout = 300        # give extra time since ML deps are heavy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[volumes]]
mountPath = "/data/chroma_db"   # this is where Railway persists your chroma data